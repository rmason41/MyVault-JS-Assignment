<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vault - New Entry</title>
    <link rel="stylesheet" type="text/css" href="stylesheet.css">
    <script src="https://kit.fontawesome.com/c476c3dbb9.js" crossorigin="anonymous"></script>
</head>
<body>
    <header id="header-container">
        <div id="title-container"><h1>My ITOL Vault</h1></div>
        <div id="nav-container">
            <nav id="main-nav">
                <a href="vault.html">Archive</a>
                <a href="new-entry.html">New Entry</a>
                <a href="index.html"><i class="fa-regular fa-circle-user"></i></a> <!-- Add profile icon from Font Awesome -->
            </nav>
        </div>
    </header>
    <section>
        
         <form id="entryForm">
            <div id="current_date">
                <script>
                    const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
                    const date = new Date();
                    const dayName = daysOfWeek[date.getDay()];
                    const monthName = months[date.getMonth()];
                    day = date.getDate();
                    year = date.getFullYear();

                    document.getElementById("current_date").innerHTML = `${dayName}, ${monthName}` + " " + day + " " + year;
                </script>
            </div>
            <input id="reflection-title" type="text" placeholder="Untitled Reflection" required>
                <br/>
            <textarea id="entry-area" placeholder="Begin your reflection..." rows="15" cols="100" required></textarea>
                <br/>
            <button id="discard" type="button">Discard</button>
            <button id="save-entry" type="submit">Save Entry</button>
         </form>
         <script src="newEntryScript.js"></script>
    </section>
    <footer id="footer-container">
        <p id="copyright">&copy; The Digital Vellum. Designed for reflection.</p>
        <div class="bottom-links">
            <a href="#Privacy">Privacy</a>
            <a href="#Terms">Terms</a>
            <a href="vault.html">Archive</a>
        </div>
    </footer>
</body>
</html>
